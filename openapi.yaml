openapi: 3.0.3
info:
  title: Task Management API
  version: 2.0.0
  description: Assignment 3 extension with reminders, categories, tags, task filtering, and completion webhooks.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: user@example.com
    Category:
      type: object
      properties:
        _id:
          type: string
          example: 6800e0ef4b6d9c0012345671
        name:
          type: string
          example: Work
        userId:
          type: integer
          example: 1
    Tag:
      type: object
      properties:
        _id:
          type: string
          example: 6800e0ef4b6d9c0012345672
        name:
          type: string
          example: High Priority
        userId:
          type: integer
          example: 1
    Task:
      type: object
      properties:
        _id:
          type: string
          example: 6800e19a4b6d9c0012345679
        title:
          type: string
          example: Prepare sprint notes
        description:
          type: string
          example: Summarize blockers and updates
        dueDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, completed]
        userId:
          type: integer
          example: 1
        category:
          allOf:
            - $ref: '#/components/schemas/Category'
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        completedAt:
          type: string
          format: date-time
          nullable: true
    Error:
      type: object
      properties:
        message:
          type: string
          example: Task not found
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        '201':
          description: User created
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/auth/login:
    post:
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login success
  /api/auth/profile:
    get:
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /api/categories:
    get:
      summary: List categories for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Categories returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Work
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
  /api/categories/{id}:
    put:
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Category updated
    delete:
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Category deleted
  /api/tags:
    get:
      summary: List tags for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tags returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
    post:
      summary: Create a tag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: High Priority
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
  /api/tags/{id}:
    put:
      summary: Update a tag
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Tag updated
    delete:
      summary: Delete a tag
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tag deleted
  /api/tasks:
    get:
      summary: List tasks, optionally filtered by category and tags
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: tagIds
          description: Comma-separated tag ids
          schema:
            type: string
            example: 6800e0ef4b6d9c0012345672,6800e0ef4b6d9c0012345673
      responses:
        '200':
          description: Tasks returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Create a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title:
                  type: string
                description:
                  type: string
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                  enum: [pending, completed]
                categoryId:
                  type: string
                  nullable: true
                tagIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
  /api/tasks/{id}:
    get:
      summary: Get a task by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
    put:
      summary: Update a task by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                  enum: [pending, completed]
                categoryId:
                  type: string
                  nullable: true
                tagIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    delete:
      summary: Delete a task by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task deleted
